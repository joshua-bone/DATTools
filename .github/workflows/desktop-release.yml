name: Build desktop release

on:
  push:
    tags:
      - "v*"
  workflow_call:
    inputs:
      release_tag:
        required: true
        type: string
    secrets:
      APPLE_CERTIFICATE:
        required: false
      APPLE_CERTIFICATE_PASSWORD:
        required: false
      APPLE_ID:
        required: false
      APPLE_PASSWORD:
        required: false
      APPLE_SIGNING_IDENTITY:
        required: false
      APPLE_TEAM_ID:
        required: false
      KEYCHAIN_PASSWORD:
        required: false
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag to build, for example v1.0.0
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-tauri:
    name: ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS Intel DMG
            platform: macos-latest
            args: --target x86_64-apple-darwin
          - name: macOS Apple Silicon DMG
            platform: macos-latest
            args: --target aarch64-apple-darwin
          - name: Linux AppImage
            platform: ubuntu-22.04
            args: ""
          - name: Windows NSIS installer
            platform: windows-latest
            args: ""

    runs-on: ${{ matrix.platform }}
    env:
      GITHUB_TOKEN: ${{ github.token }}
      KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
      MACOS_SIGNING_ENABLED: ${{ vars.MACOS_SIGNING_ENABLED == 'true' && 'true' || 'false' }}
      HAS_APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE != '' && 'true' || 'false' }}
      HAS_APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD != '' && 'true' || 'false' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.release_tag || github.ref }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache Rust artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Import Apple Developer certificate
        if: matrix.platform == 'macos-latest' && env.MACOS_SIGNING_ENABLED == 'true' && env.HAS_APPLE_CERTIFICATE == 'true' && env.HAS_APPLE_CERTIFICATE_PASSWORD == 'true' && env.KEYCHAIN_PASSWORD != ''
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          CERTIFICATE_PATH="$RUNNER_TEMP/apple-certificate.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"

          printf '%s' "$APPLE_CERTIFICATE" | base64 --decode > "$CERTIFICATE_PATH" || printf '%s' "$APPLE_CERTIFICATE" | base64 -D > "$CERTIFICATE_PATH"
          if ! openssl pkcs12 -in "$CERTIFICATE_PATH" -passin "pass:$APPLE_CERTIFICATE_PASSWORD" -nokeys >/dev/null 2>&1; then
            echo "APPLE_CERTIFICATE is not a valid base64-encoded .p12 export or APPLE_CERTIFICATE_PASSWORD is incorrect." >&2
            echo "Re-export the certificate as .p12 and encode it with: openssl base64 -A -in certificate.p12 -out certificate-base64.txt" >&2
            exit 1
          fi

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

      - name: Resolve Apple signing identity
        if: matrix.platform == 'macos-latest' && env.MACOS_SIGNING_ENABLED == 'true' && env.HAS_APPLE_CERTIFICATE == 'true' && env.HAS_APPLE_CERTIFICATE_PASSWORD == 'true' && env.KEYCHAIN_PASSWORD != ''
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          CERT_ID="$APPLE_SIGNING_IDENTITY"
          if [ -z "$CERT_ID" ]; then
            CERT_ID=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | awk -F'"' '/Developer ID Application|Apple Distribution|Apple Development/ {print $2; exit}')
          fi
          if [ -z "$CERT_ID" ]; then
            echo "No Apple signing identity found in imported keychain." >&2
            exit 1
          fi
          echo "APPLE_SIGNING_IDENTITY=$CERT_ID" >> "$GITHUB_ENV"

      - name: Build desktop release
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          APPLE_ID: ${{ vars.MACOS_SIGNING_ENABLED == 'true' && secrets.APPLE_ID || '' }}
          APPLE_PASSWORD: ${{ vars.MACOS_SIGNING_ENABLED == 'true' && secrets.APPLE_PASSWORD || '' }}
          APPLE_TEAM_ID: ${{ vars.MACOS_SIGNING_ENABLED == 'true' && secrets.APPLE_TEAM_ID || '' }}
        with:
          tagName: ${{ inputs.release_tag || github.ref_name }}
          releaseName: DATTools ${{ inputs.release_tag || github.ref_name }}
          releaseBody: |
            Desktop installers for DATTools.

            Assets:
            - Windows: NSIS installer with offline WebView2 runtime
            - macOS: DMG (unsigned by default; signed/notarized only when MACOS_SIGNING_ENABLED=true and Apple secrets are configured)
            - Linux: AppImage
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
